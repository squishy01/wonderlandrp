<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post to Discord</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #fafafa; }
        .card { background: white; padding: 20px; border: 1px solid #dbdbdb; border-radius: 8px; width: 350px; }
        select, input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0081d6; }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Post</h2>
    <form id="discordForm">
        <select id="username" required>
            <option value="" disabled selected>Select a Username</option>
            <option value="#WonderlandRP">Wonderland</option>
            <option value="#wildxfirexblossoms">Effy Carozza</option>
            <option value="#scouts_honor">Scout Morgan</option>
            <option value="#dont_cry_wolf">Syn Corvin</option>
            <option value="#supernovagirl">RJ Jones-Corvin</option>
            <option value="#drxhotxrod">JD Douglas</option>
            <option value="#amilli_ereasons">Millie Telford</option>
            <option value="#mack_corvin">Mack Corvin</option>
            <option value="#wildflowersandvinyl">Stoney Carozza</option>
            <option value="#Xan_xx">Xander Carozza</option>
            <option value="#Fixing_Mistakes">Nolan Carozza</option>
            
        </select>
        <div id="selectedUsername" style="
    margin-bottom: 15px;
    font-weight: bold;
    color: #262626;
    text-align: center;
    display: none;
"></div>
        <input type="url" id="imageUrl" placeholder="Image URL">

<input type="file" id="imageUpload" accept="image/*" style="margin-bottom: 15px;">
        <textarea id="caption" rows="4" placeholder="Write a caption...
            
            Currently Disabled"></textarea>
        <button type="submit" id="submitBtn">Publish to Discord</button>
    </form>
</div>

<script>

 const usernameSelect = document.getElementById('username');
    const usernameDisplay = document.getElementById('selectedUsername');

    usernameSelect.addEventListener('change', () => {
        usernameDisplay.textContent = usernameSelect.value;
        usernameDisplay.style.display = 'block';
    });
    
    document.getElementById('discordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Publishing...';

    const webhookUrl = 'https://discord.com/api/webhooks/YOUR_WEBHOOK';

    try {

        const file = document.getElementById('imageUpload').files[0];
        let response;

        if (file) {

            // Upload file to Discord
            const formData = new FormData();

            formData.append(
                'payload_json',
                JSON.stringify({
                    username: document.getElementById('username').value,
                    embeds: [{
                        title: "New Post 📸",
                        description: document.getElementById('caption').value,
                        image: {
                            url: `attachment://${file.name}`
                        },
                        color: 16729344
                    }]
                })
            );

            formData.append('files[0]', file, file.name);

            response = await fetch(webhookUrl, {
                method: 'POST',
                body: formData
            });

        } else {

            // Use URL method
            const payload = {
                username: document.getElementById('username').value,
                embeds: [{
                    title: "New Post 📸",
                    description: document.getElementById('caption').value,
                    image: {
                        url: document.getElementById('imageUrl').value
                    },
                    color: 16729344
                }]
            };

            response = await fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
        }

        if (response.ok) {
            alert('Posted to Discord!');
            document.getElementById('discordForm').reset();
            usernameDisplay.style.display = 'none';
            usernameDisplay.textContent = '';
        } else {
            alert('Error sending to Discord.');
        }

    } catch (err) {
        alert('Failed to connect to the webhook.');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Publish to Discord';
    }
});
</script>

</body>
</html>
