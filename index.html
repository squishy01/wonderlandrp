<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post to Discord</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .form-container { 
            background: white; 
            padding: 24px; 
            border: 1px solid #dbdbdb; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        h2 { font-size: 18px; margin-top: 0; color: #262626; }
        select, input, textarea { 
            width: 100%; 
            margin-bottom: 12px; 
            padding: 12px; 
            border: 1px solid #dbdbdb; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background-color: #0095f6; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600; 
            cursor: pointer; 
        }
        button:hover { background-color: #0081d6; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>New Post</h2>
    <form id="discordForm">
        <select id="username" required>
            <option value="" disabled selected>Select a Username</option>
            <option value="Option 1">Option 1</option>
            <option value="Option 2">Option 2</option>
        </select>
        
        <input type="url" id="imageUrl" placeholder="Image URL" required>
        <textarea id="caption" rows="3" placeholder="Write a caption..."></textarea>
        <button type="submit" id="submitBtn">Share</button>
    </form>
</div>

<script>
    document.getElementById('discordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sharing...';

        const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE';
        
        const payload = {
            username: document.getElementById('username').value,
            embeds: [{
                title: "New Post 📸",
                description: document.getElementById('caption').value,
                image: { url: document.getElementById('imageUrl').value },
                color: 16729344 
            }]
        };

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('Posted successfully!');
                document.getElementById('discordForm').reset();
            } else {
                alert('Failed to post. Check your Webhook URL.');
            }
        } catch (err) {
            alert('Error: Could not connect to Discord.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Share';
        }
    });
</script>

</body>
</html>
