<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post to Discord</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #fafafa; }
        .card { background: white; padding: 20px; border: 1px solid #dbdbdb; border-radius: 8px; width: 350px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0081d6; }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Post</h2>
    <form id="discordForm">
        <input type="text" id="username" placeholder="Your Username" required>
        <input type="url" id="imageUrl" placeholder="Image URL (e.g., https://picsum.photos/400)" required>
        <textarea id="caption" rows="4" placeholder="Write a caption..."></textarea>
        <button type="submit">Publish to Discord</button>
    </form>
</div>

<script>
    document.getElementById('discordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // NOTE: Replace this with your actual Webhook URL
        const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE';
        
        const payload = {
            username: document.getElementById('username').value,
            embeds: [{
                title: "New Post 📸",
                description: document.getElementById('caption').value,
                image: { url: document.getElementById('imageUrl').value },
                color: 16729344
            }]
        };

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('Posted to Discord!');
                document.getElementById('discordForm').reset();
            } else {
                alert('Error sending to Discord.');
            }
        } catch (err) {
            console.error('Error:', err);
            alert('Failed to connect to the webhook.');
        }
    });
</script>

</body>
</html>
